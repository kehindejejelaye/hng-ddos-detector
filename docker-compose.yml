services:

  db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hng-net

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: always
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpassword
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: adminpassword123
    volumes:
      - nextcloud_data:/var/www/html
      - hng-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hng-nginx-logs:/var/log/nginx
    networks:
      - hng-net

  detector:
    image: python:3.12-slim
    container_name: detector
    restart: always
    depends_on:
      - nginx
    network_mode: host
    volumes:
      - ./detector:/app
      - hng-nginx-logs:/var/log/nginx:ro
    working_dir: /app
    command: >
      sh -c "apt-get update -qq && apt-get install -y -qq iptables &&
             pip install -r requirements.txt -q &&
             python main.py"
    cap_add:
      - NET_ADMIN

volumes:
  db_data:
  nextcloud_data:
  hng-nginx-logs:
    name: HNG-nginx-logs

networks:
  hng-net:
    driver: bridge
